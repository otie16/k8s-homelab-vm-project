name: Backend CI

on: 
    push:
        branches: [master]
        paths:
            - 'backend/**'
            - '.github/workflows/backend-ci.yml'
    pull_request:
        branches: [master]
        paths:
            - 'backend/**'
            
env:
    IMAGE_NAME: ${{secrets.DOCKERHUB_USERNAME}}/k8s-vm-app-backend

jobs:

    # Job 1: Lint and unit tests
    lint-and-test:
        name: Lint and Unit Tests
        runs-on: ubuntu-latest
        defaults:
            run: 
                working-directory: ./backend
        
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'
                cache: 'pip'
                cache-dependency-path: backend/requirements.txt
            
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt flake8

            - name: Run flake8 lint
              run: |
                flake8 . \
                    --max-line-length=120 \
                    --exclude=migrations,__pycache__ \
                    --statistics
           
                
    # Job 2: SAST - Static Application Security Testing
    sast:
        name: SAST scan
        runs-on: ubuntu-latest
        needs: lint-and-test
        defaults:
            run: 
                working-directory: ./backend
        
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'
                cache: 'pip'
                cache-dependency-path: backend/requirements.txt

            - name: Install security tools
              run: pip install bandit pip-audit

            - name: Bandit — Python security linter
                # Scans your source code for common security issues:
                # hardcoded passwords, use of eval(), SQL injection patterns, insecure randomness, etc.
              run: |
                bandit -r . \
                    --exclude ./migrations \
                    -f json \
                    -o bandit-report.json \
                    --severity-level medium || true
                bandit -r . \
                    --exclude ./migrations \
                    --severity-level high \
                    --exit-zero
            
            - name: pip-audit — Python dependency vulnerability scanner
              # Checks every package in requirements.txt against the
              # Python Packaging Advisory Database (PyPA) for known CVEs
              run: |
                pip install -r requirements.txt
                pip-audit --requirement requirements.txt \
                    --format json \
                    --output pip-audit-report.json || true
                pip-audit --requirement requirements.txt \
                    --ignore-vuln PYSEC-2023-221

            - name: Trivy — filesystem scan
                # Scans the source tree for secrets, misconfigs, and
                # vulnerable dependencies before the image is even built
              uses: aquasecurity/trivy-action@master
              with:
                scan-type: 'fs'
                scan-ref: './backend'
                format: 'sarif'
                output: 'trivy-fs-report.sarif'
                severity: 'HIGH,CRITICAL'
                exit-code: '0'

            - name: Upload SAST reports
              uses: actions/upload-artifact@v4
              if: always()
              with:
                name: sast-reports-backend
                path: |
                    backend/bandit-report.json
                    backend/pip-audit-report.json
                    trivy-fs-report.sarif
                retention-days: 14

    # ─── Job 3: Build + image security scan ───────────────────────────────────
    build-and-scan:
        name: Build and scan image
        runs-on: ubuntu-latest
        needs: sast
        outputs:
            image-tag: ${{ steps.meta.outputs.tags }}
            image-digest: ${{ steps.build.outputs.digest }}

        steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Extract image metadata
          id: meta
          uses: docker/metadata-action@v5
          with:
            images: ${{ env.IMAGE_NAME }}
            tags: |
                type=sha,prefix=sha-
                type=ref,event=branch
                type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

        - name: Build image (no push yet — scan first)
          uses: docker/build-push-action@v5
          id: build
          with:
            context: ./backend
            push: false
            load: true
            tags: ${{ steps.meta.outputs.tags }}
            cache-from: type=gha
            cache-to: type=gha,mode=max
        
        - name: Trivy — scan the built image for CVEs
        # This scans the actual final image layers — OS packages,
        # Python packages installed during build, everything.
        # Fails the pipeline on CRITICAL vulnerabilities.
          uses: aquasecurity/trivy-action@master
          with:
            image-ref: ${{ env.IMAGE_NAME }}:latest
            format: 'table'
            exit-code: '1'
            ignore-unfixed: true
            severity: 'CRITICAL'

        - name: Trivy — full CVE report (HIGH + CRITICAL, non-blocking)
          uses: aquasecurity/trivy-action@master
          with:
            image-ref: ${{ env.IMAGE_NAME }}:latest
            format: 'sarif'
            output: 'trivy-image-report.sarif'
            severity: 'HIGH,CRITICAL'
            exit-code: '0'

        - name: Upload image scan report
          uses: actions/upload-artifact@v4
          if: always()
          with:
            name: image-scan-backend
            path: trivy-image-report.sarif
            retention-days: 14

  # ─── Job 4: Push to Docker Hub — only on main, all gates passed ───────────
    push:
        name: Push to Docker Hub
        runs-on: ubuntu-latest
        needs: build-and-scan
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'

        steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Log in to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: Extract image metadata
          id: meta
          uses: docker/metadata-action@v5
          with:
            images: ${{ env.IMAGE_NAME }}
            tags: |
                type=sha,prefix=sha-
                type=ref,event=branch
                type=raw,value=latest,enable=true

        - name: Build and push to Docker Hub
          uses: docker/build-push-action@v5
          with:
            context: ./backend
            push: true
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
            cache-from: type=gha
            cache-to: type=gha,mode=max
            provenance: true       # adds build provenance attestation
            sbom: true             # generates a Software Bill of Materials

        - name: Summary
          run: |
            echo "## Backend image pushed" >> $GITHUB_STEP_SUMMARY
            echo "**Image:** ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
            echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
            echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY