apiVersion: v1
kind: Secrets
metadata:
  name: app-secrets
  namespace: k8s-vm-app
type: Opaque
stringData:
  # Django
  DJANGO_SECRET_KEY: "prod-secret-key-change-this-to-something-random-50-chars"
  # PostgreSQL — same values used by both Django and the postgres container
  DB_USER: "appuser"
  DB_PASSWORD: "Str0ngP@ssw0rd2024"
  # Postgres root (used to init the DB)
  POSTGRES_USER: "appuser"
  POSTGRES_PASSWORD: "Str0ngP@ssw0rd2024"
  POSTGRES_DB: "appdb"
