apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: k8s-vm-app
data:
  # Django settings
  DEBUG: "False"
  ALLOWED_HOSTS: "*"
  DB_NAME: "appdb"
  DB_HOST: "postgres"        # matches the Service name below
  DB_PORT: "5432"
  # Frontend settings
  NEXT_PUBLIC_API_URL: "http://192.168.1.100:30000"   # your master IP + backend NodePort