apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-backend
  namespace: afripoint
  labels:
    app: django-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: django-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: django-backend
    spec:
      initContainers:
      - name: wait-for-postgres
        image: busybox
        command: ['sh', '-c',
          'until nc -z postgres 5432; do echo waiting; sleep 2; done']
      containers:
      - name: backend
        image: YOUR_DOCKERHUB_USERNAME/afripoint-backend:latest
        ports:
        - containerPort: 8002
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secret
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/
            port: 8002
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready/
            port: 8002
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3